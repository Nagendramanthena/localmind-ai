version: "3.9"

services:
  # ── Ollama (local LLM server) ───────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment below for NVIDIA GPU support (requires nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Model Puller (one-shot init container) ──────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "mistral:7b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # ── Agent API ───────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=mistral:7b
      - ONNX_PROVIDERS=CPUExecutionProvider
      - LOG_LEVEL=INFO
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      # Mount local data directory for persistence
      - ./data:/app/data
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local
